<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Flag Guess Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f0f2f5;
        text-align: center;
      }

      .difficulty-selector {
        margin-bottom: 20px;
      }

      .flag-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 16px;
        justify-items: center;
      }

      .flag-img {
        width: 100px;
        height: auto;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        background-color: white;
      }
    </style>
</head>

    // --- Difficulty code lists ---
    const easyCountryCodes = [
      'af','ar','au','be','br','ca','cn','dk','fj','fi','fr','de','gr','hk','is','in','id','ie','il','it','jp','my','yt','mx','ma','nl','nz','ng','no','pk','pg','pl','ru','sa','sg','za','kr','es','lk','se','ch','th','tr','ua','gb','us','vn'
    ];
    const mediumCountryCodes = [
      'al','dz','at','bd','bb','ba','bw','bg','cl','co','cm','ck','cr','hr','cu','cy','cz','ec','eg','hu','ir','iq','jm','jo','ke','ly','md','np','kp','ps','pe','ph','pt','ro','ws','sn','rs','sd','sy','tw','tz','to','tn','ug','va','ve','zw'
    ];

    // --- Difficulty filter function ---
    const getCountriesByDifficulty = (difficulty) => {
      switch(difficulty) {
        case 'easy':
          return countries.filter(c => easyCountryCodes.includes(c.code));
        case 'medium':
          return countries.filter(c => mediumCountryCodes.includes(c.code));
        case 'hard':
          return countries.filter(c => !easyCountryCodes.includes(c.code) && !mediumCountryCodes.includes(c.code));
        default:
          return countries;
      }
    };

    // --- Utility: get random elements ---
    const getRandomElements = (arr, count, excludeCodes = []) => {
      const filtered = arr.filter(c => !excludeCodes.includes(c.code));
      const shuffled = [...filtered].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
    };

    // --- Local storage hook ---
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };

      return [storedValue, setValue];
    };

    // --- Main App ---
    const App = () => {
      // Game state
      const [difficulty, setDifficulty] = useState('medium');
      const [questionCountry, setQuestionCountry] = useState(null);
      const [flagOptions, setFlagOptions] = useState([]);
      const [score, setScore] = useState(0);
      const [streak, setStreak] = useState(0);
      const [currentStreak, setCurrentStreak] = useState(0);
      const [correctAnswers, setCorrectAnswers] = useState(0);
      const [totalAnswers, setTotalAnswers] = useState(0);
      const [feedback, setFeedback] = useState('');
      const [clickedFlag, setClickedFlag] = useState(null);
      const [disableClicks, setDisableClicks] = useState(false);
      const [usedCountries, setUsedCountries] = useState([]);
      const [timeLeft, setTimeLeft] = useState(60);
      const [gameOver, setGameOver] = useState(false);
      const [showCountryNames, setShowCountryNames] = useState(false);
      const [optionCount, setOptionCount] = useState(4);
      const [highScores, setHighScores] = useLocalStorage('flagGameHighScores', []);
      const [showHighScores, setShowHighScores] = useState(false);
      const [gameStarted, setGameStarted] = useState(false);

      const timerRef = useRef(null);
      const progressBarRef = useRef(null);

      // Game config by difficulty
      const difficultySettings = {
        easy: { time: 60, optionCount: 4 },
        medium: { time: 60, optionCount: 4 },
        hard: { time: 45, optionCount: 6 }
      };

      useEffect(() => {
        return () => clearInterval(timerRef.current);
      }, []);

      useEffect(() => {
        if (timeLeft === 0) {
          endGame();
        }
        // Change timer color based on time remaining
        if (progressBarRef.current) {
          if (timeLeft <= 10) {
            progressBarRef.current.style.backgroundColor = '#dc3545';
          } else if (timeLeft <= 20) {
            progressBarRef.current.style.backgroundColor = '#ffc107';
          } else {
            progressBarRef.current.style.backgroundColor = '#4a6fa5';
          }
        }
      }, [timeLeft]);

      useEffect(() => {
        if (difficulty) {
          setTimeLeft(difficultySettings[difficulty].time);
          setOptionCount(difficultySettings[difficulty].optionCount);
        }
      }, [difficulty]);

      const startNewGame = () => {
        // Reset game state
        setScore(0);
        setStreak(0);
        setCurrentStreak(0);
        setCorrectAnswers(0);
        setTotalAnswers(0);
        setUsedCountries([]);
        setGameOver(false);
        setTimeLeft(difficultySettings[difficulty].time);
        setFeedback('');
        // Start timer
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(prev => prev - 1);
        }, 1000);
        // Generate first question
        generateQuestion([]);
        setGameStarted(true);
      };

      const endGame = () => {
        setGameOver(true);
        clearInterval(timerRef.current);
        // Save high score if applicable
        const newScore = {
          score,
          date: new Date().toISOString(),
          difficulty,
          accuracy: totalAnswers > 0 ? Math.round((correctAnswers / totalAnswers) * 100) : 0
        };
        setHighScores(prev => {
          const newScores = [...prev, newScore].sort((a, b) => b.score - a.score).slice(0, 10);
          return newScores;
        });
      };

      // --- Updated generateQuestion ---
      const generateQuestion = (used = usedCountries) => {
        const countryPool = getCountriesByDifficulty(difficulty);
        const available = countryPool.filter(c => !used.includes(c.code));
        // If we've used all countries in the pool, reset the used countries
        if (available.length < optionCount) {
          setUsedCountries([]);
          generateQuestion([]);
          return;
        }
        // Pick questionCountry from the current difficulty group
        const newQuestion = available[Math.floor(Math.random() * available.length)];
        // Pick distractors from all countries, excluding the questionCountry
        const wrongOptions = getRandomElements(countries, optionCount - 1, [newQuestion.code]);
        const allOptions = [...wrongOptions, newQuestion].sort(() => 0.5 - Math.random());

        setQuestionCountry(newQuestion);
        setFlagOptions(allOptions);
        setFeedback('');
        setClickedFlag(null);
        setDisableClicks(false);
        setUsedCountries(prev => [...prev, newQuestion.code]);
      };

      const handleFlagClick = (selectedCountry) => {
        if (disableClicks || gameOver) return;
        const isCorrect = selectedCountry.code === questionCountry.code;
        setDisableClicks(true);
        setClickedFlag(selectedCountry.code);
        setTotalAnswers(prev => prev + 1);

        if (isCorrect) {
          // Calculate bonus based on current streak
          const streakBonus = Math.floor(currentStreak / 3);
          const pointsEarned = 1 + streakBonus;
          setScore(prev => prev + pointsEarned);
          setCorrectAnswers(prev => prev + 1);
          setCurrentStreak(prev => prev + 1);
          setStreak(prev => Math.max(prev, currentStreak + 1));
          setFeedback(`✅ Correct! ${streakBonus > 0 ? `+${streakBonus} streak bonus!` : ''}`);
          setTimeout(() => generateQuestion(), 1000);
        } else {
          setCurrentStreak(0);
          setFeedback(`❌ Incorrect. That's the flag of ${selectedCountry.name}.`);
          setTimeout(() => generateQuestion(), 1500);
        }
      };

      const toggleHighScores = () => {
        setShowHighScores(!showHighScores);
      };

      const getTimerClass = () => {
        if (timeLeft <= 10) return 'danger';
        if (timeLeft <= 20) return 'warning';
        return '';
      };

      const getAccuracyPercentage = () => {
        if (totalAnswers === 0) return 0;
        return Math.round((correctAnswers / totalAnswers) * 100);
      };

      // Welcome/Start screen
      if (!gameStarted) {
        return (
          <div className="container">
            <header>
              <h1>Flag Guessing Game</h1>
              <p>Test your knowledge of world flags!</p>
            </header>
            <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
              <h2>Select Difficulty</h2>
              <div className="difficulty-selector">
                <button 
                  className={`difficulty-btn ${difficulty === 'easy' ? 'active' : ''}`}
                  onClick={() => setDifficulty('easy')}
                >
                  Easy
                </button>
                <button 
                  className={`difficulty-btn ${difficulty === 'medium' ? 'active' : ''}`}
                  onClick={() => setDifficulty('medium')}
                >
                  Medium
                </button>
                <button 
                  className={`difficulty-btn ${difficulty === 'hard' ? 'active' : ''}`}
                  onClick={() => setDifficulty('hard')}
                >
                  Hard
                </button>
              </div>
              <p>
                {difficulty === 'easy' && 'Only the most recognizable flags from around the world.'}
                {difficulty === 'medium' && 'A good mix of flags from different regions.'}
                {difficulty === 'hard' && 'All flags including territories and dependencies.'}
              </p>
              <div className="button-container">
                <button className="button success" onClick={startNewGame}>
                  Start Game
                </button>
                <button className="button" onClick={toggleHighScores}>
                  High Scores
                </button>
              </div>
            </div>
          </div>
        );
      }

      // Game over screen
      if (gameOver) {
        return (
          <div className="container">
            <header>
              <h1>Game Over!</h1>
            </header>
            <div className="game-over">
              <div className="final-score">{score}</div>
              <p>Your final score</p>
              <div className="game-stats">
                <div className="stat">
                  <span className="stat-value">{correctAnswers}</span>
                  <span className="stat-label">Correct</span>
                </div>
                <div className="stat">
                  <span className="stat-value">{totalAnswers - correctAnswers}</span>
                  <span className="stat-label">Wrong</span>
                </div>
                <div className="stat">
                  <span className="stat-value">{getAccuracyPercentage()}%</span>
                  <span className="stat-label">Accuracy</span>
                </div>
                <div className="stat">
                  <span className="stat-value">{streak}</span>
                  <span className="stat-label">Best Streak</span>
                </div>
              </div>
              <div className="button-container">
                <button className="button success" onClick={startNewGame}>
                  Play Again
                </button>
                <button className="button" onClick={toggleHighScores}>
                  High Scores
                </button>
              </div>
            </div>
          </div>
        );
      }

      // Main game screen
      return (
        <div className="container">
          <header>
            <h1>Flag Guess Game</h1>
          </header>
          <div className="game-info">
            <div className="game-stats">
              <div className="stat">
                <span className="stat-value">{score}</span>
                <span className="stat-label">Score</span>
              </div>
              <div className="stat">
                <span className="stat-value" id="timer" className={getTimerClass()}>{timeLeft}</span>
                <span className="stat-label">Seconds</span>
              </div>
              <div className="stat">
                <span className="stat-value">{currentStreak}</span>
                <span className="stat-label">Streak</span>
              </div>
            </div>
            <label>
              <input 
                type="checkbox" 
                checked={showCountryNames} 
                onChange={() => setShowCountryNames(!showCountryNames)}
              /> Show country names
            </label>
          </div>
          <div className="progress-container">
            <div 
              className="progress-bar" 
              ref={progressBarRef}
              style={{ width: `${(timeLeft / difficultySettings[difficulty].time) * 100}%` }}
            ></div>
          </div>
          {questionCountry && (
            <>
              <div className="question">
                Which is the flag of {questionCountry.name}?
              </div>
              <div className="flag-options">
                {flagOptions.map((country) => (
                  <div 
                    key={country.code} 
                    className="flag-option"
                    onClick={() => handleFlagClick(country)}
                  >
                    <img
                      className={`flag-img ${clickedFlag === country.code && country.code === questionCountry.code ? 'correct' : 
                                           clickedFlag === country.code && country.code !== questionCountry.code ? 'incorrect' : ''}`}
                      src={`https://flagcdn.com/w320/${country.code}.png`}
                      alt={country.name}
                    />
                    {showCountryNames && (
                      <div className="flag-name">{country.name}</div>
                    )}
                  </div>
                ))}
              </div>
              <div className="feedback">{feedback}</div>
            </>
          )}
          {/* High Scores Modal */}
          <div className={`modal ${showHighScores ? 'active' : ''}`}>
            <div className="modal-content">
              <div className="modal-header">
                <h2>High Scores</h2>
                <button className="modal-close" onClick={toggleHighScores}>×</button>
              </div>
              {highScores.length > 0 ? (
                <ul className="high-scores">
                  {highScores.map((entry, index) => (
                    <li key={index} className="high-score-item">
                      <span className="high-score-position">{index + 1}</span>
                      <div className="high-score-info">
                        <div>{new Date(entry.date).toLocaleDateString()}</div>
                        <div className="high-score-difficulty">
                          {entry.difficulty.charAt(0).toUpperCase() + entry.difficulty.slice(1)} · {entry.accuracy}% accuracy
                        </div>
                      </div>
                      <span className="high-score-score">{entry.score}</span>
                    </li>
                  ))}
                </ul>
              ) : (
                <p>No high scores yet. Start playing to set some records!</p>
              )}
              <div className="button-container">
                <button className="button" onClick={toggleHighScores}>Close</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
